<div class="container my-4">
    <h3 class="mb-3">Search & Buy Products</h3>
    <div class="mb-4">
        <input type="text" class="form-control" placeholder="Search products..." [(ngModel)]="searchText">
    </div>
    <div class="row">
        <div class="col-md-4 mb-4" *ngFor="let product of filteredProducts()">
            <div class="card h-100">
                <img [src]="product.image" class="card-img-top" [alt]="product.name"
                    style="height:180px;object-fit:contain;">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ product.name }}</h5>
                    <p class="card-text">{{ product.description }}</p>
                    <div class="mt-auto">
                        <span class="fw-bold">₹{{ product.price }}</span>
                        <button class="btn btn-primary btn-sm float-end">Buy Now</button>
                    </div>
                </div>
            </div>
        </div>
        <div *ngIf="filteredProducts().length === 0" class="text-center text-muted">
            No products found.
        </div>
    </div>
</div>
