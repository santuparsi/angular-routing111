<div class="container my-5">
    <div class="row">
        <div class="col-12 mb-4 d-flex justify-content-between align-items-center">
            <h2 class="mb-0">Welcome {{username}}</h2>
            <a class="btn btn-outline-danger" routerLink="/login">
                <i class="bi bi-box-arrow-right me-1"></i> Logout
            </a>
        </div>
        <div class="col-md-3 mb-4">
            <div class="card shadow-sm">

                <div class="list-group list-group-flush">
                    <a class="list-group-item list-group-item-action" routerLink="users" routerLinkActive="active">
                        <i class="bi bi-people me-2"></i>Users
                    </a>
                    <a class="list-group-item list-group-item-action" routerLink="view-products"
                        routerLinkActive="active">
                        <i class="bi bi-box-seam me-2"></i>Products
                    </a>
                    <a class="list-group-item list-group-item-action" routerLink="orders" routerLinkActive="active">
                        <i class="bi bi-card-checklist me-2"></i>Orders
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-9">
            <div class="card shadow-sm">
                <div class="card-body bg-light">
                    <router-outlet></router-outlet>
                </div>
            </div>
        </div>
    </div>
</div>
